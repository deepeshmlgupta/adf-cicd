name: ADF CI - Validate

on:
  pull_request:
    branches:
      - dev
      - uat
      - prod

jobs:
  validate:
    name: Validate ADF ARM Templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      # No ADF resource ID needed — validates against local files in $GITHUB_WORKSPACE
      - name: Validate ADF Resources
        run: npm run validate $GITHUB_WORKSPACE
